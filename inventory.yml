all:
  children:
    app_servers:
      hosts:
        menu-app:
          ansible_host: "{{ ip.app1_ip }}"
        menu-app-2:
          ansible_host: "{{ ip.app2_ip }}"
    db_servers:
      hosts:
        menu-db:
          ansible_host: "{{ ip.db_ip }}"
    lb_servers:
      hosts:
        menu-lb:
          ansible_host: "{{ ip.lb_ip }}"
  vars:
    ansible_user: ubuntu
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3
