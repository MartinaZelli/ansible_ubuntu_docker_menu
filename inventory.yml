all:
  children:
    app_servers:
      hosts:
        app:
          ansible_host: "{{ ip.app1_ip }}"
        app-2:
          ansible_host: "{{ ip.app2_ip }}"
    db_servers:
      hosts:
      db:
          ansible_host: "{{ ip.db_ip }}"
    lb_servers:
      hosts:
        lb:                        #se si fa refactor del nome del gruppo, ricordarsi di aggiornare anche i riferimenti in database.yml e progetto.yml
          ansible_host: "{{ ip.lb_ip }}"
  vars:
    ansible_user: ubuntu
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3
