all:
  children:
    app_servers:
      hosts:
        app:
          ansible_host: "{{ ip.app1_ip }}"
        app-2:
          ansible_host: "{{ ip.app2_ip }}"
    db_servers:
      hosts:
        db:
          ansible_host: "{{ ip.db_ip }}"
    lb_servers:
      hosts:
        lb:
          ansible_host: "{{ ip.lb_ip }}"
    ldap_servers:
      hosts:
        ldap:
          ansible_host: "{{ ip.ldap_ip }}"
    ldap_clients:
      hosts:
        lb:
    # per un futuro potrei scrivere l'intero gruppo ldap_client così per dichiarare che l'intero gruppo è figlio dell'altro.
    #ldap_clients:
     # children:
     #   lb_servers:
  vars:
    ansible_user: ubuntu
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_python_interpreter: /usr/bin/python3
