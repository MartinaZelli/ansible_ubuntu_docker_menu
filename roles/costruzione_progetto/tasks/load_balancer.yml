---
# 1. Installazione del pacchetto HAProxy ufficiale nativo (senza Docker)
- name: load_balancer | Installa HAProxy nativamente sul sistema
  ansible.builtin.apt:
    name: haproxy
    state: present
  become: true

# 2. Apertura del firewall UFW per il traffico pubblico (Porta 80 e Porta Dashboard)
- name: load_balancer | Firewall - Consenti il traffico sulle porte HTTP e Stats
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  become: true
  loop:
    - "{{ lb_config.frontend_port }}"
    - "{{ lb_config.stats_port }}"

# 3. Generazione del file di configurazione partendo dal template Jinja2
- name: load_balancer | Configura HAProxy tramite Template Jinja2
  ansible.builtin.template:
    src: "{{ playbook_dir }}/roles/costruzione_progetto/templates/haproxy.cfg.j2"
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  become: true
  notify: "Riavvia HAProxy"

# 4. Assicura che il servizio sia abilitato al boot del sistema
- name: load_balancer | Assicura che HAProxy sia abilitato al boot
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
  become: true
